<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Query Manager</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
    <div class="app-shell">
        <header>
            <div class="header-content">
                <h1>📋 Query Manager</h1>
                <p>Track your groups, queries, and pending replies in one place.</p>
            </div>
        </header>

        <section class="card form-card">
            <div class="card-header">
                <h2>➕ Add a new query</h2>
            </div>
            <form id="queryForm">
                <div class="form-group">
                    <label for="groupInput">Group / Team</label>
                    <input list="groupNames" type="text" id="groupInput" placeholder="Enter group or team name"
                        required />
                    <datalist id="groupNames"></datalist>
                </div>

                <div class="group-hint">
                    <span>Saved groups:</span>
                    <strong id="savedGroups">No groups yet</strong>
                </div>

                <div class="form-group">
                    <label for="queryInput">Query text</label>
                    <textarea id="queryInput" rows="4" placeholder="Enter your query here..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="statusInput">Status</label>
                    <select id="statusInput">
                        <option value="Pending">⏳ Pending</option>
                        <option value="Replied">✅ Replied</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Save query</button>
            </form>
        </section>
        <section class="card stats-card">
            <div class="stat">
                <strong id="totalCount">0</strong>
                <span>Total queries</span>
            </div>
            <div class="stat">
                <strong id="pendingCount">0</strong>
                <span>Pending replies</span>
            </div>
        </section>

        <section class="card list-card">
            <div class="card-header">
                <h2>📊 All Queries</h2>
            </div>
            <div id="queryList"></div>
            <p id="emptyMessage" class="empty-message">No queries yet. Add one above to get started.</p>
        </section>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>

</html>
