<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Query Manager</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
    <div class="app-shell">
        <header>
            <h1>Query Manager</h1>
            <p>Track your groups, queries, and pending replies in one place.</p>
        </header>

        <section class="card form-card">
            <h2>Add a new query</h2>
            <form id="queryForm">
                <label>Group / Team
                    <input list="groupNames" type="text" id="groupInput" placeholder="Enter group or team name"
                        required />
                    <datalist id="groupNames"></datalist>
                </label>
                <div class="group-hint">

                    <div class="group-hint">
                        <span>Saved groups:</span>
                        <strong id="savedGroups">No groups yet</strong>
                    </div>
                    <label>Query text
                        <textarea id="queryInput" rows="4" placeholder="Enter query text" required></textarea>
                    </label>
                    <label>Status
                        <select id="statusInput">
                            <option value="Pending">Pending</option>
                            <option value="Replied">Replied</option>
                        </select>
                    </label>
                    <button type="submit">Save query</button>
            </form>
        </section>

        <section class="card stats-card">
            <div>
                <strong id="totalCount">0</strong>
                <span>Total queries</span>
            </div>
            <div>
                <strong id="pendingCount">0</strong>
                <span>Pending replies</span>
            </div>
        </section>

        <!-- Filters removed -->

        <section class="card list-card">
            <h2>Queries</h2>
            <div id="queryList"></div>
            <p id="emptyMessage" class="empty-message">No queries yet. Add one above to get started.</p>
        </section>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>

</html>
